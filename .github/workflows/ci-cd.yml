name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Change to project folder
        run: cd ${{ matrix.project }}

      - name: Install dependencies
        run: |
          cd ${{ matrix.project }}
          npm ci

      - name: Run lint
        run: |
          cd ${{ matrix.project }}
          npm run lint
        continue-on-error: false

      - name: Run tests
        run: |
          cd ${{ matrix.project }}
          npm test
        continue-on-error: false

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      BACKEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
      FRONTEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_FRONTEND }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          cd backend
          docker build -f ../docker/Dockerfile -t $ECR_REGISTRY/$BACKEND_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:latest

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -f ../docker/Dockerfile.frontend -t $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest

  deploy-to-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
      BACKEND_SERVICE_NAME: ${{ secrets.ECS_BACKEND_SERVICE_NAME }}
      FRONTEND_SERVICE_NAME: ${{ secrets.ECS_FRONTEND_SERVICE_NAME }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      BACKEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
      FRONTEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_FRONTEND }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update backend ECS service
        run: |
          aws ecs update-service \
            --cluster ${CLUSTER_NAME} \
            --service ${BACKEND_SERVICE_NAME} \
            --force-new-deployment \
            --image ${ECR_REGISTRY}/${BACKEND_REPOSITORY}:latest

      - name: Update frontend ECS service
        run: |
          aws ecs update-service \
            --cluster ${CLUSTER_NAME} \
            --service ${FRONTEND_SERVICE_NAME} \
            --force-new-deployment \
            --desired-count 1

      - name: Run migration after deploy
        run: |
          aws ecs execute-command \
            --cluster ${CLUSTER_NAME} \
            --task $(aws ecs list-tasks --cluster ${CLUSTER_NAME} --service-name ${BACKEND_SERVICE_NAME} --query 'taskArns[0]' --output text) \
            --container school-erp-backend \
            --command "npm run db:deploy" \
            --interactive
        env:
          CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          BACKEND_SERVICE_NAME: ${{ secrets.ECS_BACKEND_SERVICE_NAME }}
          BACKEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          FRONTEND_SERVICE_NAME: ${{ secrets.ECS_FRONTEND_SERVICE_NAME }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
